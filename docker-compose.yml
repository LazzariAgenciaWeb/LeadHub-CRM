version: '3.8'

services:
  app:
    image: ghcr.io/lazzariagenciaweb/leadhub-crm:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://leadhub:leadhub123@db:5432/leadhub
      DIRECT_URL: postgresql://leadhub:leadhub123@db:5432/leadhub
      NEXTAUTH_URL: https://app.azzagencia.com.br
      NEXTAUTH_SECRET: dK7mP9xQ2rL5nW8vY1tA4uJ6hF3cE0bG
      NEXT_PUBLIC_BASE_URL: https://app.azzagencia.com.br
      NODE_OPTIONS: "--max-old-space-size=400"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadhub
      POSTGRES_PASSWORD: leadhub123
      POSTGRES_DB: leadhub
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
